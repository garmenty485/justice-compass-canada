name: Deploy Cloudflare Worker

on:
  # Disabled by default in this template repo (no CLOUDFLARE_API_TOKEN secret yet,
  # and this path filter matches this file itself, so editing it would auto-fail).
  # Once you've set the secret (README Step 7), uncomment `push` below to enable
  # auto-deploy on every push to main.
  # push:
  #   branches: [main]
  #   paths:
  #     - "cloudflare/worker/**"
  #     - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and deploy Worker
        working-directory: cloudflare/worker
        run: |
          npm install
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
